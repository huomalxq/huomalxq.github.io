site_name: Huoma LXQ
site_description: 林祥庆的 LLM 系统、Agent 工程与学习记录主页
site_url: https://huomalxq.github.io/
repo_url: https://github.com/huomalxq/huomalxq.github.io
repo_name: GitHub
theme:
  name: material
  language: zh
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
plugins: []
extra_css:
  - assets/stylesheets/extra.css
nav:
  - 首页: index.md
  - 个人简历:
      - 简历总览: resume/index.md
  - 学习记录:
      - 学习总览: study/index.md
      - 数据分析 Agent 后端项目: study/data-analysis-agent.md
      - Teco-RAG 项目总结: study/teco-rag-project-summary.md
      - GSM8K 后训练实验复盘: study/gsm8k-post-training-experiments.md
      - Datawhale LLM-Algo-LeetCode:
          - Part 01 Hardware, Math and Systems:
              - 01 Data Types and Precision: study/llm-algo-leetcode/llm-data-types-and-precision.md
              - 03 GPU Architecture and Memory: study/llm-algo-leetcode/llm-gpu-architecture-and-memory.md
